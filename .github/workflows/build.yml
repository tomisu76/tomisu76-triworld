name: TriWorld Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --silent
      - run: npm test -- --reporter=dot
      - name: TypeScript typecheck
        run: npx tsc --noEmit
      - name: Vite production build
        run: npx vite build
