name: TriWorld Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --silent
      - name: Test
        run: npm test -- --reporter=verbose
      - name: TypeScript typecheck
        run: npx tsc --noEmit
      - name: Web production build
        run: npx vite build
      - name: BeamNG road-first ZIP
        run: npm run beamng:v4:road
      - name: Upload BeamNG package
        uses: actions/upload-artifact@v4
        with:
          name: triworld-v4-road-first
          path: |
            dist/triworld_v4_road_first.zip
            dist/triworld_v4_road_first.manifest.json
          if-no-files-found: error
