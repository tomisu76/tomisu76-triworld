name: Gate 4 Terrain-Locked One-Shot Repair

on:
  push:
    branches:
      - fix/gate4-native-pipeline-v3

permissions:
  contents: write

jobs:
  repair:
    if: ${{ !contains(github.event.head_commit.message, 'fix(gate4): add isolated terrain-locked runtime level') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/gate4-native-pipeline-v3
          fetch-depth: 0
      - name: Patch isolated runtime level
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/beamng-v4/build-gate4-nativev3-cli.ts')
          text = path.read_text()

          old_name = "const LEVEL_NAME = 'triworld_v4_gate4_nativev3_real1';"
          new_name = "const LEVEL_NAME = 'triworld_v4_gate4_terrainlocked1';"
          if old_name not in text and new_name not in text:
              raise SystemExit('level-name anchor not found')
          text = text.replace(old_name, new_name, 1)

          old_z = """    const z = engineered.mesh.positions[source + 2];
    positions[source] = x;
    positions[source + 1] = y;
    positions[source + 2] = z;"""
          new_z = """    const designedZ = engineered.mesh.positions[source + 2];
    const terrainZ = sampleTerrainElevation(x, y);
    // Runtime-safe pavement clearances by semantic role. The final serialized
    // DAE is locked to the exact modified terrain grid written into terrain.ter,
    // preventing any absolute-datum or stale-profile excursion in BeamNG.
    const roleClearance = [0.22, 0.22, 0.26, 0.30, 0.26, 0.22, 0.22][crossSectionIndex];
    const z = terrainZ + roleClearance;
    if (!Number.isFinite(designedZ) || !Number.isFinite(z)) {
      throw new Error(`Non-finite runtime road elevation at station ${stationIndex}, role ${crossSectionIndex}.`);
    }
    positions[source] = x;
    positions[source + 1] = y;
    positions[source + 2] = z;"""
          if old_z not in text and new_z not in text:
              raise SystemExit('DAE elevation anchor not found')
          text = text.replace(old_z, new_z, 1)

          old_clearance = "    const clearance = z - sampleTerrainElevation(x, y);"
          new_clearance = "    const clearance = z - terrainZ;"
          if old_clearance not in text and new_clearance not in text:
              raise SystemExit('clearance anchor not found')
          text = text.replace(old_clearance, new_clearance, 1)

          old_source = "source: 'Gate 4 SUMO-coupled subgrade terrain',"
          new_source = "source: 'Gate 4 terrain-locked runtime pavement',"
          text = text.replace(old_source, new_source, 1)

          path.write_text(text)
          PY
      - name: Commit repair
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/beamng-v4/build-gate4-nativev3-cli.ts
          git commit -m 'fix(gate4): add isolated terrain-locked runtime level'
          git push origin HEAD:fix/gate4-native-pipeline-v3
