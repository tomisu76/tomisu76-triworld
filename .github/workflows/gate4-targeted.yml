name: Gate 4 Targeted

on:
  pull_request:
    paths:
      - 'src/beamng-v4/**'
      - 'src/pipeline-v3/**'
      - 'src/roads/**'
      - 'artifacts/gate3-osm/**'
      - '.github/workflows/gate4-targeted.yml'
  workflow_dispatch:

jobs:
  gate4-targeted:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Run coupled SUMO-subgrade-DAE regression
        shell: bash
        run: |
          set +e
          npx vitest run src/beamng-v4/gate4-coupled-road.test.ts --reporter=verbose --no-color > /tmp/gate4-coupled.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "GATE4_COUPLED_FAILURE"
            grep -E "FAIL|AssertionError|expected|received|gate4-coupled-road|negativeCount|minClearance|maxClearance" /tmp/gate4-coupled.log | tail -n 30 || true
            exit "$status"
          fi
          tail -n 12 /tmp/gate4-coupled.log
      - name: Upload coupled regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate4-coupled-log
          path: /tmp/gate4-coupled.log
          if-no-files-found: error
          retention-days: 1
      - name: Run remaining Gate 4 targeted tests
        run: >-
          npx vitest run
          src/beamng-v4/sumo-road-source.test.ts
          src/beamng-v4/osm-road-source.test.ts
          src/roads/road-pipeline.test.ts

  gate4-real-package:
    needs: gate4-targeted
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      LOCALAPPDATA: /tmp/triworld-beamng-local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Generate real DEM and orthophoto package
        shell: bash
        run: |
          set +e
          npx --yes tsx src/beamng-v4/build-gate4-nativev3-cli.ts > /tmp/gate4-real-package.log 2>&1
          status=$?
          cat /tmp/gate4-real-package.log
          exit "$status"
      - name: Upload real package log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate4-real-package-log
          path: /tmp/gate4-real-package.log
          if-no-files-found: error
          retention-days: 3
      - name: Upload BeamNG package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: triworld-v4-gate4-nativev3-real1
          path: |
            dist/triworld_v4_gate4_nativev3_real1.zip
            dist/triworld_v4_gate4_nativev3_real1.manifest.json
            dist/triworld_v4_gate4_nativev3_real1_report.json
          if-no-files-found: error
          retention-days: 7
