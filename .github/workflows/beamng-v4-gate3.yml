name: BeamNG V4 Gate 3 Recovery

on:
  pull_request:
    branches:
      - rewrite/beamng-native-v4
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript and Vite build
        run: npm run build

      - name: Complete Vitest suite
        run: npx vitest run --reporter=json --outputFile=vitest-results.json

      - name: Upload Vitest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beamng-v4-vitest-results
          path: vitest-results.json
          if-no-files-found: error
